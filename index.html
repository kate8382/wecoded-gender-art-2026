<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- site favicon: scales -->
  <link href="img/scale.svg" rel="icon" type="image/svg+xml">
  <link href="img/scale.svg" rel="apple-touch-icon">
  <title>WeCoded — Gender Equity Art 2026</title>
  <link href="css/normalize.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/main.js" type="module" defer></script>
</head>

<body>
  <div class="page flex">
    <div class="page__zoom" id="pageZoom">
    <header class="page__header">
      <h1 class="visually-hidden">Gender Equity — Frontend Art</h1>
    </header>

    <main class="page__scene flex" role="main">
        <section class="scene-scales" aria-label="Scales which represent gender equity" role="img">
          <!-- inline scales SVG for easier styling -->
          <svg class="scene-scales-svg scales-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" role="img">
            <g stroke-linecap="round" stroke-linejoin="round" fill="none">
              <path class="scales-svg__stem" d="M12 3v18"></path>
              <path class="scales-svg__panpath left" d="m5 8 3 8a5 5 0 0 1-6 0zV7"></path>
              <path class="scales-svg__panpath right" d="m19 8 3 8a5 5 0 0 1-6 0zV7"></path>
              <path class="scales-svg__beam" d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"></path>
              <path class="scales-svg__base" d="M7 21h10"></path>
            </g>
          </svg>
          <!-- pan targets: invisible DOM anchors positioned over each cup to compute landing coords -->
          <div class="pan-target pan-target--left" data-side="female" aria-hidden="true">
            <div class="pan-target__main" aria-hidden="true"></div>
            <ul class="pan-target__items" aria-live="polite">
              <!-- items will be added dynamically -->
            </ul>
          </div>
          <div class="pan-target pan-target--right" data-side="male" aria-hidden="true">
            <div class="pan-target__main" aria-hidden="true"></div>
          </div>
          <!-- soft ground shadow to add volume -->
          <div class="scales-shadow" aria-hidden="true"></div>
        </section>
        </main>   

    <footer class="page__footer flex">
      <p class="page__footer-note">&copy;&nbsp;Created for WeCoded 2026&nbsp;&mdash; Frontend Art: Gender Equity</p>
    </footer>

    </div>
  </div>
  <!-- Start overlay: covers viewport, contains central start button and THE END -->
  <div class="start-overlay flex" id="startOverlay" aria-label="Start demo" role="dialog">
    <div>
      <h2 class="the-end" id="theEnd" aria-hidden="true">THE END</h2>
      <button class="start-button" id="startButton">
        <svg class="start-button__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M6 4v16a1 1 0 0 0 1.524 .852l13 -8a1 1 0 0 0 0 -1.704l-13 -8a1 1 0 0 0 -1.524 .852z"></path></svg>
      </button>      
    </div>
  </div>
  <!-- confetti placeholder: shown on celebration -->
  <div class="confetti-container" id="confettiContainer" aria-hidden="true"></div>
</body>

</html>
